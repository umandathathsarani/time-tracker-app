<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker</title>
    
    <link rel="icon" type="image/png" href="assets/icons/ladybug.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/clock.css">
</head>
<body>
    <canvas id="glitter-canvas"></canvas>

    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="active"><i class="fa-solid fa-earth-americas"></i> Clock</a>
            <a href="timer.html"><i class="fa-solid fa-hourglass-half"></i> Timer</a>
            <a href="alarm.html"><i class="fa-solid fa-bell"></i> Alarm</a>
            <a href="stopwatch.html"><i class="fa-solid fa-stopwatch"></i> Stopwatch</a>
            <a href="pomodoro.html"><i class="fa-solid fa-brain"></i> Pomodoro</a>
        </div>
        
        <button id="theme-toggle" class="theme-btn">
            <i class="fa-solid fa-user-secret"></i> Toggle Identity
        </button>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 2rem; color: var(--text-color);">World Clock</h1>
        
        <div class="clock-grid">
            <div class="clock-card local card-local">
                <h2>Local Time</h2>
                <div class="time" id="local-time">00:00:00</div>
                <div class="date" id="local-date">Loading...</div>
            </div>

            <div class="clock-card card-ny">
                <h2>New York</h2>
                <div class="time" id="ny-time">00:00:00</div>
                <div class="date" id="ny-date">Loading...</div>
            </div>

            <div class="clock-card card-london">
                <h2>London</h2>
                <div class="time" id="london-time">00:00:00</div>
                <div class="date" id="london-date">Loading...</div>
            </div>

            <div class="clock-card card-tokyo">
                <h2>Tokyo</h2>
                <div class="time" id="tokyo-time">00:00:00</div>
                <div class="date" id="tokyo-date">Loading...</div>
            </div>

            <div class="clock-card card-thailand">
                <h2>Thailand</h2>
                <div class="time" id="thailand-time">00:00:00</div>
                <div class="date" id="thailand-date">Loading...</div>
            </div>

            <div class="clock-card card-china">
                <h2>China</h2>
                <div class="time" id="china-time">00:00:00</div>
                <div class="date" id="china-date">Loading...</div>
            </div>

            <div class="clock-card card-korea">
                <h2>South Korea</h2>
                <div class="time" id="korea-time">00:00:00</div>
                <div class="date" id="korea-date">Loading...</div>
            </div>

            <div class="clock-card card-la">
                <h2>Los Angeles</h2>
                <div class="time" id="la-time">00:00:00</div>
                <div class="date" id="la-date">Loading...</div>
            </div>
        </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/glitter.js"></script>
</body>
</html>
